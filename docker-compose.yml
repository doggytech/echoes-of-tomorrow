version: '3.8'

services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - SAVE_DIR=/app/data
    volumes:
      - ./data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echoes-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - echoes-network
    # Pull and run model on startup
    entrypoint: >
      sh -c "
        /bin/ollama serve &
        sleep 5
        echo 'Pulling ${OLLAMA_MODEL:-llama3.2} model...'
        ollama pull ${OLLAMA_MODEL:-llama3.2}
        echo 'Model ready!'
        wait
      "

volumes:
  ollama-models:
    driver: local

networks:
  echoes-network:
    driver: bridge
