services:
  - type: web
    name: echoes-of-tomorrow
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_PROVIDER
        value: turso
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: AI_PROVIDER
        value: openrouter
      - key: OPENROUTER_URL
        value: https://openrouter.ai/api/v1/chat/completions
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: SITE_URL
        sync: false
      - key: SITE_NAME
        value: Echoes of Tomorrow
      - key: AI_REQUEST_TIMEOUT_MS
        value: "60000"
      - key: IMPORT_LEGACY_FILE_SAVES
        value: "false"
